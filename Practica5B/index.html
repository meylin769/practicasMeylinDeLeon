<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
</head>
<body>

    <h1>Formulario de Información Personal</h1>

    <form>
        <p>
            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre">
        </p>

        <p>
            <label for="edad">Edad:</label><br>
            <input type="number" id="edad" name="edad">
        </p>

        <p>
            <label for="fecha">Fecha de nacimiento:</label><br>
            <input type="date" id="fecha" name="fecha">
        </p>

        <p>
            <label for="color">Color favorito:</label><br>
            <input type="color" id="color" name="color">
        </p>

        <p>
            <label for="comida">Comida favorita:</label><br>
            <input type="text" id="comida" name="comida">
        </p>

        <p>
            <label for="hobbie">Hobbie favorito:</label><br>
            <input type="text" id="hobbie" name="hobbie">
        </p>

        <p>
            <strong>¿Tiene gatos o perros?</strong><br>
            <input type="checkbox" id="gato" name="mascota" value="gato">
            <label for="gato">Gatos</label><br>
            
            <input type="checkbox" id="perro" name="mascota" value="perro">
            <label for="perro">Perros</label><br>

            <input type="checkbox" id="ninguno" name="mascota" value="ninguno">
            <label for="ninguno">Ninguno</label>
        </p>

        <p>
            <input type="submit" value="Registrar">
        </p>
    </form>

</body>
</html>
